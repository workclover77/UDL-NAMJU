<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 멀티 e-book</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f9f9f9; }
        .page { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .media-container { margin: 20px 0; text-align: center; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #4A90E2; color: white; }
    </style>
</head>
<body>

    <div class="page">
        <h2>1. 오늘의 이야기 듣기</h2>
        <p>글자를 보며 아래 재생 버튼을 눌러 소리를 들어보세요.</p>
        
        <!-- 음성 파일 연결 (GitHub 저장소에 있는 mp3 파일 이름) -->
        <div class="media-container">
            <audio controls>
                <source src="narration.mp3" type="audio/mpeg">
                브라우저가 오디오를 지원하지 않습니다.
            </audio>
        </div>

        <!-- 유튜브 영상 연결 -->
        <div class="media-container">
            <iframe width="100%" height="315" src="https://www.youtube.com/embed/영상코드" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="nav-buttons">
            <button onclick="alert('이전 페이지가 없습니다.')">이전</button>
            <button onclick="location.href='page2.html'">다음 단계로</button>
        </div>
    </div>

</body>
</html>
