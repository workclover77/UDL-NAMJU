<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3학년 사회 - 우리 고장의 모습</title>
    <style>
        /* 고해상도 태블릿을 위한 기본 설정 */
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f0f4f8;
            --font-size-base: 24px; /* 태블릿 가독성을 위해 기본 폰트를 크게 설정 */
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 2000px; /* 너무 퍼지지 않게 제한 */
            background: white;
            margin: 40px 0;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { font-size: 3rem; color: #333; text-align: center; }
        p { font-size: 1.8rem; line-height: 1.6; color: #555; }

        /* 미디어 박스 (영상, 사진 등이 들어갈 곳) */
        .media-box {
            width: 100%;
            aspect-ratio: 16 / 9; /* 2560*1600 비율과 유사하게 유지 */
            background: #eee;
            border-radius: 20px;
            margin: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 큰 버튼 스타일 (특수 학생의 조작 편의성) */
        .nav-footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
        }

        .btn {
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-next { background-color: var(--primary-color); color: white; }
        .btn-prev { background-color: #ccc; color: #333; }
        .btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="container">
        <h1>📍 우리 고장의 모습 알아보기</h1>
        <p>아래 영상을 보고 우리 동네의 소중한 장소들을 찾아보세요.</p>

        <!-- 미디어 영역: 여기에 유튜브 iframe이나 이미지를 넣습니다 -->
        <div class="media-box">
            <!-- 임시 이미지 (나중에 영상 코드로 교체) -->
            <p style="font-size: 1.5rem;">[여기에 학습 영상이나 지도가 들어갑니다]</p>
        </div>

        <div class="nav-footer">
            <button class="btn btn-prev">이전으로</button>
            <button class="btn btn-next" onclick="alert('다음 페이지를 연결해 주세요!')">다음으로</button>
        </div>
    </div>

</body>
</html>
